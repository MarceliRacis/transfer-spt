stages:
  - build

.build_base: &build_base
  stage: build
  tags:
    - arm64
  image: docker:26
  variables:
    IMAGE: registry.racis.dev/marceliracis/transfer-spt
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker buildx create --use --name builder || true
    - docker buildx inspect --bootstrap

build_latest:
  <<: *build_base
  script:
    - docker buildx build
        --platform linux/amd64,linux/arm64
        --tag $IMAGE:latest
        --push .
  only:
    - main

build_tag:
  <<: *build_base
  script:
    - docker buildx build
        --platform linux/amd64,linux/arm64
        --tag $IMAGE:$CI_COMMIT_TAG
        --tag $IMAGE:latest
        --push .
  only:
    - tags
