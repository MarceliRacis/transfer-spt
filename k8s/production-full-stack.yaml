apiVersion: v1
kind: Namespace
metadata:
  name: spt-transfer
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: spt-config
  namespace: spt-transfer
data:
  NODE_ENV: "production"
  PORT: "3000"
  REDIRECT_URI: "http://spt.yourdomain.com/auth/callback" # Zmień na swoją domenę
  REDIS_URL: "redis://spt-redis:6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: spt-secrets
  namespace: spt-transfer
type: Opaque
data:
  # Base64 encoded values
  SPOTIFY_CLIENT_ID: "" # echo -n 'val' | base64
  SPOTIFY_CLIENT_SECRET: ""
  SESSION_SECRET: ""
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: spt-transfer
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spt-redis
  namespace: spt-transfer
spec:
  selector:
    matchLabels:
      app: spt-redis
  template:
    metadata:
      labels:
        app: spt-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        command: ["redis-server", "--appendonly", "yes"]
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: data
          mountPath: /data
        healthcheck:
          test: ["CMD", "redis-cli", "ping"]
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: spt-redis
  namespace: spt-transfer
spec:
  selector:
    app: spt-redis
  ports:
  - port: 6379
    targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spt-transfer
  namespace: spt-transfer
spec:
  replicas: 2 # Skalowalne dzięki Redisowi
  selector:
    matchLabels:
      app: spt-transfer
  template:
    metadata:
      labels:
        app: spt-transfer
    spec:
      containers:
      - name: app
        image: registry.racis.dev/marceliracis/transfer-spt:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: spt-config
        - secretRef:
            name: spt-secrets
        healthcheck:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: spt-transfer-service
  namespace: spt-transfer
spec:
  type: LoadBalancer # MetalLB przypisze IP
  selector:
    app: spt-transfer
  ports:
  - port: 3000
    targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spt-transfer-ingress
  namespace: spt-transfer
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  rules:
  - host: spt.yourdomain.com # Zmień na swoją domenę
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: spt-transfer-service
            port:
              number: 3000
